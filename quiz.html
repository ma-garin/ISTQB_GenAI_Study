<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>問題演習 | ISTQB CT-GenAI</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#2980b9">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <script>if ('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js');</script>
</head>
<body>
  <header>
    <div class="header-inner">
      <a href="index.html" class="logo">ISTQB CT-GenAI <span class="badge">v1.0</span></a>
      <nav>
        <a href="index.html">ホーム</a>
        <a href="study.html">学習</a>
        <a href="quiz.html" class="active">問題演習</a>
        <a href="slides.html">スライド</a>
        <a href="glossary.html">用語集</a>
        <a href="syllabus-ja.html">日本語対訳</a>
      </nav>
    </div>
  </header>

  <main>
    <div class="section-title">✏️ 問題演習</div>

    <!-- コントロール -->
    <div class="quiz-controls">
      <div class="select-group">
        <label>モード：</label>
        <select id="modeSelect">
          <option value="practice">通常演習</option>
          <option value="diagnostic">診断テスト（20問）</option>
        </select>
      </div>
      <div class="select-group">
        <label>章を選択：</label>
        <select id="chapterSelect">
          <option value="0">全章</option>
          <option value="1">第1章：GenAIの概要</option>
          <option value="2">第2章：プロンプトエンジニアリング</option>
          <option value="3">第3章：リスク管理</option>
          <option value="4">第4章：LLM搭載テストインフラ</option>
          <option value="5">第5章：導入と統合</option>
        </select>
      </div>
      <div class="select-group">
        <label>出題順：</label>
        <select id="orderSelect">
          <option value="random">ランダム</option>
          <option value="sequential">順番通り</option>
        </select>
      </div>
      <button class="btn btn-primary" onclick="startQuiz()">▶ 開始</button>
    </div>

    <!-- スタート画面 -->
    <div class="quiz-start" id="quizStart">
      <div style="font-size:3rem;margin-bottom:16px;">✏️</div>
      <h2>問題演習</h2>
      <p>章と出題順を選択して「開始」ボタンを押してください。</p>
      <div class="quiz-info-grid" id="quizInfoGrid">
        <div class="quiz-info-item">
          <div class="num" id="totalQCount">60</div>
          <div class="label">問題数（全章）</div>
        </div>
        <div class="quiz-info-item">
          <div class="num">K1–K3</div>
          <div class="label">難易度レベル</div>
        </div>
        <div class="quiz-info-item">
          <div class="num">5</div>
          <div class="label">章構成</div>
        </div>
      </div>

      <div class="lo-dashboard" id="loDashboard">
        <h3>📈 学習目標（LO）進捗</h3>
        <div class="lo-stats-grid" id="loStatsGrid"></div>
        <div class="lo-weak-list" id="loWeakList"></div>
      </div>
    </div>

    <!-- プログレスバー -->
    <div class="quiz-progress" id="quizProgress" style="display:none;">
      <div class="progress-bar">
        <div class="progress-fill" id="progressFill" style="width:0%"></div>
      </div>
      <div class="progress-text" id="progressText">0 / 0</div>
      <div class="score-text" id="scoreText">正解: 0</div>
    </div>

    <!-- 問題エリア -->
    <div id="quizArea"></div>

    <!-- 結果画面 -->
    <div class="result-card" id="resultCard">
      <div class="result-score" id="resultScore">0<span> / 0</span></div>
      <h2 id="resultTitle"></h2>
      <p id="resultMsg"></p>
      <div class="result-chart">
        <div class="result-item">
          <div class="num correct-num" id="correctCount">0</div>
          <div class="label">正解</div>
        </div>
        <div class="result-item">
          <div class="num incorrect-num" id="incorrectCount">0</div>
          <div class="label">不正解</div>
        </div>
        <div class="result-item">
          <div class="num" id="accuracyRate">0%</div>
          <div class="label">正答率</div>
        </div>
      </div>
      <div class="result-insights" id="resultInsights" style="display:none;">
        <h3>章別の結果</h3>
        <div class="chapter-result-grid" id="chapterResultGrid"></div>
        <h3>優先して復習するLO</h3>
        <div class="lo-weak-list" id="resultWeakLoList"></div>
      </div>
      <div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap;">
        <button class="btn btn-primary" onclick="startQuiz()">もう一度</button>
        <button class="btn btn-secondary" onclick="showStart()">設定に戻る</button>
      </div>
    </div>
  </main>

  <script src="js/quiz-data.js"></script>
  <script>
    const CHAPTER_COLORS = ['', '#2980b9', '#8e44ad', '#c0392b', '#16a085', '#d35400'];
    const LO_STATS_KEY = 'ctgenai-lo-stats-v1';
    const DIAGNOSTIC_QUESTION_COUNT = 20;
    let questions = [];
    let currentIndex = 0;
    let score = 0;
    let answered = [];
    let activeMode = 'practice';

    function shuffleInPlace(arr) {
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
    }

    function getAllLos() {
      return [...new Set(quizData.map(q => q.lo))];
    }

    function loadLoStats() {
      try {
        return JSON.parse(localStorage.getItem(LO_STATS_KEY) || '{}');
      } catch (e) {
        return {};
      }
    }

    function saveLoStats(stats) {
      localStorage.setItem(LO_STATS_KEY, JSON.stringify(stats));
    }

    function initializeLoStats() {
      const stats = loadLoStats();
      for (const q of quizData) {
        if (!stats[q.lo]) {
          stats[q.lo] = { chapter: q.chapter, total: 0, correct: 0, lastAnswered: null };
        }
      }
      saveLoStats(stats);
    }

    function updateLoStats(question, isCorrect) {
      const stats = loadLoStats();
      if (!stats[question.lo]) {
        stats[question.lo] = { chapter: question.chapter, total: 0, correct: 0, lastAnswered: null };
      }
      stats[question.lo].chapter = question.chapter;
      stats[question.lo].total += 1;
      if (isCorrect) stats[question.lo].correct += 1;
      stats[question.lo].lastAnswered = Date.now();
      saveLoStats(stats);
    }

    function renderLoDashboard() {
      const stats = loadLoStats();
      const allLos = getAllLos();
      const rows = allLos.map(lo => {
        const s = stats[lo] || { chapter: Number(lo.split('.')[1]), total: 0, correct: 0 };
        const accuracy = s.total > 0 ? Math.round((s.correct / s.total) * 100) : null;
        return { lo, chapter: s.chapter, total: s.total, correct: s.correct, accuracy };
      });

      const attempted = rows.filter(r => r.total > 0);
      const mastered = rows.filter(r => r.total >= 3 && r.accuracy !== null && r.accuracy >= 80);
      const weak = rows
        .filter(r => r.total >= 2 && r.accuracy !== null && r.accuracy < 60)
        .sort((a, b) => a.accuracy - b.accuracy || b.total - a.total)
        .slice(0, 5);

      document.getElementById('loStatsGrid').innerHTML = `
        <div class="lo-stat-item"><div class="num">${allLos.length}</div><div class="label">LO総数</div></div>
        <div class="lo-stat-item"><div class="num">${attempted.length}</div><div class="label">着手済みLO</div></div>
        <div class="lo-stat-item"><div class="num">${mastered.length}</div><div class="label">定着LO（80%以上）</div></div>
        <div class="lo-stat-item"><div class="num">${weak.length}</div><div class="label">要復習LO</div></div>
      `;

      const weakHtml = weak.length
        ? weak.map(w => `<div class="lo-weak-item">第${w.chapter}章 / ${w.lo} : 正答率 ${w.accuracy}%（${w.correct}/${w.total}）</div>`).join('')
        : '<div class="lo-weak-item" style="border-left-color:#27ae60;">要復習LOはまだありません。まずは診断テストを受けてください。</div>';
      document.getElementById('loWeakList').innerHTML = weakHtml;
    }

    function getDiagnosticQuestions(totalCount) {
      const chapters = [1, 2, 3, 4, 5];
      const chapterPools = {};
      chapters.forEach(ch => {
        chapterPools[ch] = quizData.filter(q => q.chapter === ch);
        shuffleInPlace(chapterPools[ch]);
      });

      const picked = [];
      let remaining = totalCount;
      const basePerChapter = Math.floor(totalCount / chapters.length);

      chapters.forEach(ch => {
        const take = Math.min(basePerChapter, chapterPools[ch].length);
        picked.push(...chapterPools[ch].splice(0, take));
        remaining -= take;
      });

      const fillOrder = [...chapters].sort((a, b) => chapterPools[b].length - chapterPools[a].length);
      while (remaining > 0) {
        let tookAny = false;
        for (const ch of fillOrder) {
          if (remaining <= 0) break;
          if (chapterPools[ch].length > 0) {
            picked.push(chapterPools[ch].shift());
            remaining -= 1;
            tookAny = true;
          }
        }
        if (!tookAny) break;
      }

      shuffleInPlace(picked);
      return picked;
    }

    function getFilteredQuestions() {
      const mode = document.getElementById('modeSelect').value;
      if (mode === 'diagnostic') return getDiagnosticQuestions(DIAGNOSTIC_QUESTION_COUNT);

      const ch = parseInt(document.getElementById('chapterSelect').value);
      let q = ch === 0 ? [...quizData] : quizData.filter(x => x.chapter === ch);
      const order = document.getElementById('orderSelect').value;
      if (order === 'random') shuffleInPlace(q);
      return q;
    }

    function showStart() {
      document.getElementById('quizStart').style.display = 'block';
      document.getElementById('quizProgress').style.display = 'none';
      document.getElementById('quizArea').innerHTML = '';
      document.getElementById('resultCard').classList.remove('show');
      document.getElementById('resultInsights').style.display = 'none';
      updateInfoCount();
      renderLoDashboard();
    }

    function updateModeUI() {
      const isDiagnostic = document.getElementById('modeSelect').value === 'diagnostic';
      document.getElementById('chapterSelect').disabled = isDiagnostic;
      document.getElementById('orderSelect').disabled = isDiagnostic;
    }

    function updateInfoCount() {
      const mode = document.getElementById('modeSelect').value;
      if (mode === 'diagnostic') {
        document.getElementById('totalQCount').textContent = DIAGNOSTIC_QUESTION_COUNT;
        return;
      }
      const ch = parseInt(document.getElementById('chapterSelect').value);
      const count = ch === 0 ? quizData.length : quizData.filter(x => x.chapter === ch).length;
      document.getElementById('totalQCount').textContent = count;
    }

    document.getElementById('chapterSelect').addEventListener('change', updateInfoCount);
    document.getElementById('modeSelect').addEventListener('change', () => {
      updateModeUI();
      updateInfoCount();
    });

    function startQuiz() {
      questions = getFilteredQuestions();
      if (questions.length === 0) return;
      activeMode = document.getElementById('modeSelect').value;
      currentIndex = 0;
      score = 0;
      answered = new Array(questions.length).fill(null);
      document.getElementById('quizStart').style.display = 'none';
      document.getElementById('resultCard').classList.remove('show');
      document.getElementById('resultInsights').style.display = 'none';
      document.getElementById('quizProgress').style.display = 'flex';
      renderQuestion();
    }

    function renderQuestion() {
      updateProgress();
      const q = questions[currentIndex];
      const labels = ['A', 'B', 'C', 'D'];
      const alreadyAnswered = answered[currentIndex] !== null;
      const userAnswer = answered[currentIndex];

      const optionsHtml = q.options.map((opt, i) => {
        let cls = '';
        if (alreadyAnswered) {
          if (i === q.answer) cls = 'reveal-correct';
          if (i === userAnswer && userAnswer !== q.answer) cls = 'incorrect';
          if (i === userAnswer && userAnswer === q.answer) cls = 'correct';
        }
        return `<button class="option-btn ${cls}" onclick="selectAnswer(${i})" ${alreadyAnswered ? 'disabled' : ''}>
          <span class="option-label">${labels[i]}</span>
          <span>${opt}</span>
        </button>`;
      }).join('');

      const expClass = alreadyAnswered ? 'show' : '';

      document.getElementById('quizArea').innerHTML = `
        <div class="question-card">
          <div class="question-header">
            <div class="q-chapter-badge" style="background:${CHAPTER_COLORS[q.chapter]}">第${q.chapter}章</div>
            <div class="question-meta">
              <div class="q-id">${q.lo} | ${q.id}</div>
              <div class="q-level"><span class="badge-k${q.level.toLowerCase()}">${q.level}</span></div>
            </div>
            <div style="font-size:0.85rem;color:var(--text-light);">${currentIndex + 1} / ${questions.length}</div>
          </div>
          <div class="question-body">
            <div class="question-text">${q.question}</div>
            <div class="options">${optionsHtml}</div>
            <div class="explanation ${expClass}">
              <strong>💡 解説：</strong> ${q.explanation}
            </div>
          </div>
          <div class="question-actions">
            <button class="btn btn-secondary" onclick="prevQuestion()" ${currentIndex === 0 ? 'disabled' : ''}>← 前へ</button>
            ${alreadyAnswered && currentIndex < questions.length - 1
              ? `<button class="btn btn-primary" onclick="nextQuestion()">次へ →</button>`
              : ''}
            ${alreadyAnswered && currentIndex === questions.length - 1
              ? `<button class="btn btn-success" onclick="showResult()">結果を見る</button>`
              : ''}
          </div>
        </div>
      `;
    }

    function selectAnswer(idx) {
      if (answered[currentIndex] !== null) return;
      answered[currentIndex] = idx;
      const isCorrect = idx === questions[currentIndex].answer;
      if (isCorrect) score++;
      updateLoStats(questions[currentIndex], isCorrect);
      renderQuestion();
    }

    function nextQuestion() {
      if (currentIndex < questions.length - 1) {
        currentIndex++;
        renderQuestion();
      }
    }

    function prevQuestion() {
      if (currentIndex > 0) {
        currentIndex--;
        renderQuestion();
      }
    }

    function updateProgress() {
      const answeredCount = answered.filter(a => a !== null).length;
      const pct = questions.length > 0 ? (answeredCount / questions.length) * 100 : 0;
      document.getElementById('progressFill').style.width = pct + '%';
      document.getElementById('progressText').textContent = `${answeredCount} / ${questions.length}`;
      document.getElementById('scoreText').textContent = `正解: ${score}`;
    }

    function showResult() {
      const total = questions.length;
      const pct = total > 0 ? Math.round((score / total) * 100) : 0;
      document.getElementById('quizArea').innerHTML = '';
      document.getElementById('quizProgress').style.display = 'none';

      let title = '', msg = '';
      if (activeMode === 'diagnostic') {
        if (pct >= 80) { title = '診断結果: 強みが明確です'; msg = '高得点です。弱いLOだけに絞って仕上げましょう。'; }
        else if (pct >= 60) { title = '診断結果: 伸びしろあり'; msg = '章別とLO別の弱点を優先して復習すると効率的です。'; }
        else { title = '診断結果: 基礎固め優先'; msg = '苦手章の学習後に再診断すると改善を確認できます。'; }
      } else {
        if (pct >= 80) { title = '優秀！'; msg = 'CT-GenAI試験合格ラインを超えています。引き続き知識を深めましょう。'; }
        else if (pct >= 60) { title = 'もう少し！'; msg = '合格ラインまであと一歩。苦手な章を重点的に復習しましょう。'; }
        else { title = '復習が必要です'; msg = '基礎から丁寧に復習しましょう。学習コンテンツを参考にしてください。'; }
      }

      document.getElementById('resultScore').innerHTML = `${score}<span> / ${total}</span>`;
      document.getElementById('resultTitle').textContent = title;
      document.getElementById('resultMsg').textContent = msg;
      document.getElementById('correctCount').textContent = score;
      document.getElementById('incorrectCount').textContent = total - score;
      document.getElementById('accuracyRate').textContent = pct + '%';
      renderResultInsights();
      document.getElementById('resultCard').classList.add('show');
      renderLoDashboard();
    }

    function renderResultInsights() {
      const chapterStats = {};
      const loStats = {};

      for (let i = 0; i < questions.length; i++) {
        const q = questions[i];
        const isCorrect = answered[i] === q.answer;
        if (!chapterStats[q.chapter]) chapterStats[q.chapter] = { total: 0, correct: 0 };
        chapterStats[q.chapter].total += 1;
        if (isCorrect) chapterStats[q.chapter].correct += 1;

        if (!loStats[q.lo]) loStats[q.lo] = { chapter: q.chapter, total: 0, correct: 0 };
        loStats[q.lo].total += 1;
        if (isCorrect) loStats[q.lo].correct += 1;
      }

      const chapterHtml = Object.keys(chapterStats)
        .sort((a, b) => Number(a) - Number(b))
        .map(ch => {
          const item = chapterStats[ch];
          const rate = Math.round((item.correct / item.total) * 100);
          return `<div class="chapter-result-item"><div class="title">第${ch}章</div><div class="value">${rate}%（${item.correct}/${item.total}）</div></div>`;
        })
        .join('');
      document.getElementById('chapterResultGrid').innerHTML = chapterHtml;

      const weakLoRows = Object.keys(loStats)
        .map(lo => {
          const item = loStats[lo];
          return { lo, chapter: item.chapter, total: item.total, correct: item.correct, accuracy: Math.round((item.correct / item.total) * 100) };
        })
        .filter(x => x.accuracy < 70)
        .sort((a, b) => a.accuracy - b.accuracy || b.total - a.total)
        .slice(0, 5);

      const weakLoHtml = weakLoRows.length
        ? weakLoRows.map(w => `<div class="lo-weak-item">第${w.chapter}章 / ${w.lo} : 正答率 ${w.accuracy}%（${w.correct}/${w.total}）</div>`).join('')
        : '<div class="lo-weak-item" style="border-left-color:#27ae60;">今回の出題範囲では大きな弱点LOは見つかりませんでした。</div>';
      document.getElementById('resultWeakLoList').innerHTML = weakLoHtml;
      document.getElementById('resultInsights').style.display = 'block';
    }

    // 初期化
    initializeLoStats();
    updateModeUI();
    updateInfoCount();
    renderLoDashboard();
  </script>
</body>
</html>
