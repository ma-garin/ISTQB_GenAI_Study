<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>用語集 | ISTQB CT-GenAI</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#2980b9">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <script>if ('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js');</script>
</head>
<body>
  <header>
    <div class="header-inner">
      <a href="index.html" class="logo">ISTQB CT-GenAI <span class="badge">v1.0</span></a>
      <nav>
        <a href="index.html">ホーム</a>
        <a href="study.html">学習</a>
        <a href="quiz.html">問題演習</a>
        <a href="glossary.html" class="active">用語集</a>
        <a href="syllabus-ja.html">日本語対訳</a>
      </nav>
    </div>
  </header>

  <main>
    <div class="section-title">📚 用語集</div>

    <div class="glossary-search">
      <input type="text" class="search-input" id="searchInput" placeholder="用語を検索..." oninput="filterGlossary()">
      <div class="category-filters" id="categoryFilters"></div>
    </div>

    <div style="font-size:0.85rem;color:var(--text-light);margin-bottom:16px;" id="countText"></div>

    <div class="glossary-grid" id="glossaryGrid"></div>
  </main>

  <script src="js/glossary-data.js"></script>
  <script>
    const CATEGORY_COLORS = {
      'AI基礎': '#2980b9',
      'LLM技術': '#8e44ad',
      'プロンプトエンジニアリング': '#16a085',
      'リスクと品質': '#c0392b',
      'インフラ・アーキテクチャ': '#d35400'
    };

    let activeCategory = '全て';

    function buildCategoryFilters() {
      const cats = ['全て', ...new Set(glossaryData.map(g => g.category))];
      const el = document.getElementById('categoryFilters');
      el.innerHTML = cats.map(c =>
        `<button class="filter-btn ${c === activeCategory ? 'active' : ''}" onclick="setCategory('${c}')">${c}</button>`
      ).join('');
    }

    function setCategory(cat) {
      activeCategory = cat;
      buildCategoryFilters();
      filterGlossary();
    }

    function filterGlossary() {
      const query = document.getElementById('searchInput').value.toLowerCase();
      const filtered = glossaryData.filter(g => {
        const matchCat = activeCategory === '全て' || g.category === activeCategory;
        const matchSearch = !query ||
          g.term.toLowerCase().includes(query) ||
          g.definition.toLowerCase().includes(query);
        return matchCat && matchSearch;
      });

      document.getElementById('countText').textContent = `${filtered.length} 件 / 全 ${glossaryData.length} 件`;

      const grid = document.getElementById('glossaryGrid');
      if (filtered.length === 0) {
        grid.innerHTML = `<div class="empty-state"><div class="icon">🔍</div><div>該当する用語が見つかりませんでした</div></div>`;
        return;
      }

      const highlight = (text) => {
        if (!query) return text;
        const re = new RegExp(`(${query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})`, 'gi');
        return text.replace(re, '<mark style="background:#fff176;border-radius:2px;">$1</mark>');
      };

      grid.innerHTML = filtered.map(g => `
        <div class="glossary-item">
          <div class="g-term">${highlight(g.term)}</div>
          <div class="g-category" style="color:${CATEGORY_COLORS[g.category] || 'var(--primary)'}">● ${g.category}</div>
          <div class="g-def">${highlight(g.definition)}</div>
        </div>
      `).join('');
    }

    buildCategoryFilters();
    filterGlossary();
  </script>
</body>
</html>
